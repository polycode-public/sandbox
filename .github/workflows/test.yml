# test.yml — mechanical green/red gate. Runs the unit suite on every PR and on main
# so a delivery's PR carries a status check the orchestrator (a human, the Claude
# benchmark harness, or marginalia) can read WITHOUT a local checkout. Browser/
# behaviour tests stay out of this gate — they run in screenshot-publish.yml.
name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: npm ci || npm install
      - name: Unit tests
        run: npm test
