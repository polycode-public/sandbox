<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>intentïon repository</title>
  <meta property="og:title" content="intentïon repository">
  <meta property="og:description" content="An autonomous repository powered by agentic-lib">
  <meta property="og:type" content="website">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 820px; margin: 0 auto; padding: 2rem; color: #1f2328; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: #57606a; margin: 1.5rem 0 0.5rem; }
    a { color: #0366d6; }
    .identity { color: #57606a; font-family: monospace; margin: 0 0 0.5rem; }
    #mission { background: #f6f8fa; padding: 1rem; border-radius: 6px; border-left: 4px solid #0969da; }
    #intent-title { font-weight: 600; margin-bottom: 0.25rem; }
    #api-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 0.4rem; }
    #api-list li { background: #ddf4ff; color: #0969da; padding: 0.2rem 0.6rem; border-radius: 2em; font-family: monospace; font-size: 0.9rem; }
    #demo-output { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">intentïon repository</h1>
  <div class="identity"><span id="lib-version">…</span> · <span id="lib-description">…</span></div>

  <h2>Intent</h2>
  <div id="mission"><div id="intent-title">Loading INTENT.md…</div></div>

  <h2>Delivered API</h2>
  <ul id="api-list"><li>loading…</li></ul>

  <h2>Live demo — exercising src/lib/main.js</h2>
  <div id="demo-output">Loading library…</div>

  <script type="module">
    // package.json / INTENT.md are served from the repo root (baseURL .../src/web/).
    async function fetchText(url) { try { const r = await fetch(url); return r.ok ? await r.text() : ''; } catch { return ''; } }
    async function fetchJson(url) { try { const r = await fetch(url); return r.ok ? await r.json() : {}; } catch { return {}; } }
    try {
      const lib = await import('./lib.js');
      const [pkg, intentText] = await Promise.all([
        fetchJson('../../package.json'),
        fetchText('../../INTENT.md'),
      ]);
      const demo = lib.renderDemo(lib, { pkg, intentText });

      document.getElementById('lib-name').textContent = demo.name;
      document.getElementById('lib-version').textContent = 'v' + (demo.version || '0.0.0');
      document.getElementById('lib-description').textContent = demo.description || 'an intentïon repository';
      document.getElementById('intent-title').textContent = demo.mission || '(INTENT.md not found)';

      const apiEl = document.getElementById('api-list');
      apiEl.innerHTML = '';
      const feature = demo.api.filter((a) => !['name','version','description','getIdentity'].includes(a.name));
      (feature.length ? feature : demo.api).forEach((a) => {
        const li = document.createElement('li');
        li.textContent = a.kind === 'function' ? `${a.name}(${'·'.repeat(a.arity || 0)})` : a.name;
        apiEl.appendChild(li);
      });

      document.getElementById('demo-output').textContent = demo.output || '(no output)';
      document.title = demo.name + ' v' + demo.version;
    } catch (e) {
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
